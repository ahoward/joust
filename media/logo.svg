<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200">
  <defs>
    <linearGradient id="lance1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lance2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- left lance -->
  <line x1="60" y1="135" x2="220" y2="85" stroke="url(#lance1)" stroke-width="5" stroke-linecap="round"/>
  <!-- left shield -->
  <circle cx="72" cy="115" r="18" fill="none" stroke="url(#lance1)" stroke-width="3"/>
  <text x="72" y="121" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#ef4444">A</text>

  <!-- right lance -->
  <line x1="420" y1="135" x2="260" y2="85" stroke="url(#lance2)" stroke-width="5" stroke-linecap="round"/>
  <!-- right shield -->
  <circle cx="408" cy="115" r="18" fill="none" stroke="url(#lance2)" stroke-width="3"/>
  <text x="408" y="121" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#3b82f6">B</text>

  <!-- clash sparks -->
  <circle cx="240" cy="83" r="4" fill="url(#spark)"/>
  <circle cx="233" cy="76" r="2.5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="248" cy="78" r="2.5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="237" cy="90" r="2" fill="#f59e0b" opacity="0.6"/>
  <circle cx="244" cy="91" r="2" fill="#f59e0b" opacity="0.6"/>

  <!-- title -->
  <text x="240" y="168" text-anchor="middle" font-family="monospace" font-size="52" font-weight="bold" letter-spacing="8" fill="#e2e8f0">JOUST</text>
  <text x="240" y="188" text-anchor="middle" font-family="monospace" font-size="11" letter-spacing="4" fill="#64748b">ADVERSARIAL ARCHITECTURE COMPILER</text>
</svg>
